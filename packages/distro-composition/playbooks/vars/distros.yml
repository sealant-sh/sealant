---
distro_definitions:
  arch:
    base_image: archlinux:latest
    update_command: pacman -Syu --noconfirm
    install_command: pacman -S --noconfirm --needed
    cleanup_command: pacman -Scc --noconfirm || true
    dependency_packages:
      nodejs:
        - nodejs
      pnpm:
        - pnpm
      neovim:
        - neovim
      postgresql:
        - postgresql

  fedora:
    base_image: fedora:41
    update_command: dnf -y upgrade --refresh
    install_command: dnf -y install
    cleanup_command: dnf clean all
    dependency_packages:
      nodejs:
        - nodejs
      pnpm:
        - pnpm
      neovim:
        - neovim
      postgresql:
        - postgresql
        - postgresql-server
