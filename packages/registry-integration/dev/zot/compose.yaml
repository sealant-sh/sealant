services:
  zot:
    image: ghcr.io/project-zot/zot-minimal:v2.1.15
    command: ["serve", "/etc/zot/config.json"]
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    volumes:
      - ./config.json:/etc/zot/config.json:ro
      - zot-data:/var/lib/registry

volumes:
  zot-data:
