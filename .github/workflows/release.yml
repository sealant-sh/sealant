# Release: on a v*.*.* tag, build + push the multi-arch product images to GHCR, smoke-test the
# packaged install end-to-end (install.sh against the just-pushed images), publish the GitHub
# release with the compose file attached — which is what makes `releases/latest` (and therefore the
# curl|sh installer) resolve to this version — and publish @sealant/sdk + @sealant/api-contracts to
# npm. Mirrors sealantd's release workflow. The npm job runs in parallel with the image pipeline;
# if only one side fails, re-run just the failed jobs (`gh run rerun <id> --failed`) — a full re-run
# would hit npm's "cannot republish an existing version".
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  image:
    name: Image (${{ matrix.name }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sealant-api
            dockerfile: apps/api/Dockerfile
          - name: sealant-worker
            dockerfile: apps/worker/Dockerfile
          - name: sealant-ssh-gateway
            dockerfile: apps/ssh-gateway/Dockerfile
          - name: sealant-web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU emulates arm64 on the amd64 runner; native arm64 runners + a per-arch matrix can
      # replace this later (same follow-up as sealantd).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker builder (Blacksmith cache)
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # The web image must never receive VITE_API_URL at build time — the server reads
      # CORE_API_BASE_URL at runtime, and a baked VITE_ value would shadow it.
      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Run the real installer against the images just pushed: stack must come up healthy (API, web,
  # SSH gateway) from a clean machine with only Docker — the same contract users get.
  selfhost-smoke:
    name: Self-host install smoke
    needs: image
    runs-on: ubuntu-latest
    # Pull ANONYMOUSLY, exactly like a user: GHCR authorizes GITHUB_TOKEN by package↔repo linkage
    # (not visibility), and logging in with it 403'd even on public packages during the v0.1.0
    # release. Anonymous pulls of public packages always work. Consequence: the first release of any
    # NEW image name fails here until its GHCR package is flipped public — flip it, then re-run the
    # failed jobs (`gh run rerun <id> --failed`).
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer against the tagged images
        env:
          SEALANT_VERSION: ${{ github.ref_name }}
          SEALANT_COMPOSE_URL: ${{ github.workspace }}/compose.selfhost.yaml
        # compose version first: the runner's compose behaved differently from local ones during the
        # v0.1.x releases — keep it in the logs for debugging.
        run: |
          docker compose version
          sh install.sh

      - name: Assert SSH gateway is listening
        run: |
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/2222) 2>/dev/null; then exec 3>&-; echo "gateway up"; exit 0; fi
            sleep 2
          done
          echo "gateway did not come up" >&2
          docker compose --project-directory ~/.sealant logs ssh-gateway >&2
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose --project-directory ~/.sealant logs

  npm:
    name: Publish npm packages
    # Kept on a github-hosted runner: OIDC Trusted Publishing (tokenless npm auth + provenance)
    # should mint its id-token on infrastructure GitHub controls, not a third-party runner.
    runs-on: ubuntu-latest
    # Protected environment: configure required reviewers on `release` in repo settings, and
    # register both packages' npm Trusted Publishers against this repo + release.yml + this
    # environment. (The very first publish of a brand-new package name must be done manually with
    # an npm token/OTP — trusted publishing attaches to an existing package.)
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # The git tag is the single version authority: overwrite both package.json versions from it
      # so the published versions always match the release, regardless of what is committed.
      - name: Sync package versions from the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm --filter "@sealant/api-contracts" --filter "@sealant/sdk" \
            exec npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm --filter "@sealant/api-contracts" --filter "@sealant/sdk" run build

      # Tokenless OIDC Trusted Publishing: `registry-url` + `id-token: write` is the whole auth
      # mechanism (no NPM_TOKEN secret). `--provenance` attaches the public build attestation.
      - name: Publish to npm
        run: |
          pnpm --filter "@sealant/api-contracts" --filter "@sealant/sdk" \
            publish --access public --no-git-checks --provenance

  release:
    name: Publish GitHub release
    needs: selfhost-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The attached compose file is what install.sh downloads, and install.sh itself is attached so
      # `releases/latest/download/install.sh` (the get.sealant.dev redirect target) always serves
      # the exact script shipped with the release. Creating the release is also what moves
      # `releases/latest` (the installer's default version) to this tag.
      - name: Create release with compose + installer assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release create "$GITHUB_REF_NAME" compose.selfhost.yaml install.sh --generate-notes
          --verify-tag
