services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: sealant
      POSTGRES_PASSWORD: sealant
      POSTGRES_DB: sealant_control_plane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sealant -d sealant_control_plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: sealant
      RABBITMQ_DEFAULT_PASS: sealant
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  zot:
    image: ghcr.io/project-zot/zot-minimal:v2.1.15
    command: ["serve", "/etc/zot/config.json"]
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    volumes:
      - ./packages/sandboxes/dev/zot/config.json:/etc/zot/config.json:ro
      - zot-data:/var/lib/registry

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    profiles:
      - apps
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zot:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # §2.2: shared host dir where each sandbox's control socket is exposed, so the gateway reaches
      # the daemon directly (and needs no Docker socket). Same path is mounted read-only into the gateway.
      - /run/sealant/sockets:/run/sealant/sockets
    environment:
      RABBITMQ_URL: amqp://sealant:sealant@rabbitmq:5672
      REGISTRY_BASE_URL: http://zot:5000
      REGISTRY_PUSH_REGISTRY: 127.0.0.1:5000
      DATABASE_URL: postgresql://sealant:sealant@postgres:5432/sealant_control_plane
      DEFAULT_SSH_ENDPOINT_EXPOSURE_STRATEGY: container-network
      SANDBOX_CONTROL_SOCKET_HOST_DIR: /run/sealant/sockets
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ssh-gateway:
    build:
      context: .
      dockerfile: apps/ssh-gateway/Dockerfile
    profiles:
      - apps
    depends_on:
      worker:
        condition: service_started
    # Host networking: the gateway reaches the Core API over plain loopback (127.0.0.1:4000) instead of
    # crossing the docker bridge via host.docker.internal, which required a host firewall rule to admit
    # bridge-subnet traffic. It also listens on 127.0.0.1:2222 directly — no port publish needed.
    network_mode: host
    volumes:
      # First-boot autogenerated host key lives here (same mechanism as compose.selfhost.yaml);
      # /keys/gateway_allowed_keys is an optional operator break-glass allowlist.
      - gateway-keys:/keys
      # §2.2: read-only access to the per-sandbox control sockets the worker exposes here. The gateway
      # connects to them directly (unix://) — NO Docker socket, so a gateway compromise cannot reach the
      # host Docker daemon (which would be host root). The worker still has the socket; the gateway must not.
      - /run/sealant/sockets:/run/sealant/sockets:ro
    env_file:
      - ./.env
    environment:
      SSH_GATEWAY_HOST: 127.0.0.1
      SSH_GATEWAY_PORT: 2222
      SSH_GATEWAY_HOST_KEY_PATH: /keys/ssh_gateway_host_key
      SSH_GATEWAY_HOST_KEY_AUTOGENERATE: "true"
      SSH_GATEWAY_ALLOWED_KEYS_FILE: /keys/gateway_allowed_keys
      SSH_GATEWAY_SANDBOX_USERNAME_PREFIX: sbx
      CORE_API_BASE_URL: http://127.0.0.1:4000
    restart: unless-stopped

volumes:
  postgres-data:
  zot-data:
  gateway-keys:
